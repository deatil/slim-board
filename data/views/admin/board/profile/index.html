<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>更新信息</title>
</head>

<body>
    <div class="box">
        更新信息
        
        <a href="{{ url_for('admin.index') }}">返回首页</a>

        <hr />

        <form method="post">
            账号:<br>
            <input type="text" 
                name="username"
                autocomplete="false"
                value="{{ data.username }}"
                id="username">
            <br>
            
            账号昵称:<br>
            <input type="text" 
                name="nickname"
                value="{{ data.nickname }}"
                id="nickname">
            <br>
            
            账号密码:<br>
            <input type="password" 
                name="password"
                autocomplete="false"
                id="password">
            <br>
            留空不更新密码
            <br>
            
            个性签名:<br>
            <textarea class="form-control" 
                name="sign"
                placeholder="自定义签名" 
                id="sign" 
                style="height: 150px;">{{ data.sign }}</textarea>
            <br>
            
            <button type="button" class="layui-btn js-save-button">保存</button>
        </form> 

    </div>
    <script src='{{ assets("js/jquery-3.4.1.min.js") }}' type="text/javascript"></script>
    <script src='{{ assets("js/layer/layer.js") }}' type="text/javascript"></script>
    <script type="text/javascript">
    (function($) {
        "use strict";
        
        // 登录
        $(".js-save-button").click(function(e) {
            e.stopPropagation;
            e.preventDefault;

            var username = $("#username").val();
            var nickname = $("#nickname").val();
            var password = $("#password").val();
            var sign = $("#sign").val();

            var url = "{{ url_for('admin.profile-save') }}";
            $.post(url, {
                username: username,
                nickname: nickname,
                password: password,
                sign: sign,
            }, function(data) {
                if (data.code == 0) {
                    layer.msg("更新信息成功");
                    
                    setTimeout(function() {
                        window.location.href = "{{ url_for('admin.profile') }}";
                    }, 1500);
                } else {
                    layer.msg(data.msg);
                }
            }).fail(function (xhr, status, info) {
                layer.msg("请求失败");
            });
        });
    })(jQuery);
    </script>

</body>
</html>
